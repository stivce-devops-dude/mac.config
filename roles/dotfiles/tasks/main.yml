  tags:
    - dotfiles

- name: Checkout OS dotfiles
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    --work-tree={{ user_home }}
    checkout -f
  when: not dotfiles_os_check.stat.exists
  changed_when: true
  tags:
    - dotfiles

- name: Fetch OS dotfiles
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    fetch origin main
  changed_when: false
  when: dotfiles_os_check.stat.exists
  tags:
    - dotfiles

- name: Check if OS dotfiles have upstream changes
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    rev-parse HEAD FETCH_HEAD
  register: dotfiles_os_refs
  changed_when: false
  when: dotfiles_os_check.stat.exists
  tags:
    - dotfiles

- name: Reset OS dotfiles to FETCH_HEAD
  ansible.builtin.command: >
    git --git-dir={{ user_home }}/{{ dotfiles_os_dir }}
    --work-tree={{ user_home }}
    reset --hard FETCH_HEAD
  when:
    - dotfiles_os_check.stat.exists
    - dotfiles_os_refs.stdout_lines[0] != dotfiles_os_refs.stdout_lines[1]
  changed_when: true
  tags:
    - dotfiles
